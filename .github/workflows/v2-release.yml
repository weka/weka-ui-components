name: V2 Release

on:
  push:
    tags:
      - 'v*.*.*' # Triggers on version tags like v4.0.0, v4.1.0, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      tickets: ${{ steps.tickets.outputs.value }}
    permissions:
      contents: write # For creating GitHub Release
      packages: write # For publishing to GitHub Packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for branch detection

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@weka'

      - name: Check branch for official releases
        run: |
          VERSION="${GITHUB_REF_NAME}"
          # Get the branch that contains this tag
          BRANCHES=$(git branch -r --contains ${{ github.sha }} | grep -v HEAD || true)

          if [[ ! "$VERSION" =~ "beta" && ! "$VERSION" =~ "alpha" && ! "$VERSION" =~ "rc" ]]; then
            # Official release - must be on main
            if [[ ! "$BRANCHES" =~ "origin/main" ]]; then
              echo "❌ Official releases must be from main branch"
              echo "   Tag: $VERSION"
              echo "   Branches containing this commit: $BRANCHES"
              echo ""
              echo "To fix: merge your changes to main first, then create the tag from main"
              exit 1
            fi
            echo "✅ Official release from main branch"
          else
            echo "✅ Pre-release ($VERSION) - allowed from any branch"
          fi

      - name: Enable Corepack (for Yarn 4)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Extract tickets from source commits
        id: tickets
        run: |
          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -v -e '-beta' -e '-alpha' -e '-rc' -e "^${GITHUB_REF_NAME}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            TICKETS=$(git log --format='%B' "$PREV_TAG..HEAD" --grep='^publish v' --invert-grep | grep -oE 'WH-[0-9]+' | sort -u | tr '\n' ',' || true)
          else
            TICKETS=""
          fi
          echo "value=${TICKETS%,}" >> $GITHUB_OUTPUT

      - name: Sync version from git tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to: $TAG_VERSION"
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        run: yarn build

      - name: Run tests
        run: yarn test:run

      - name: Configure npm authentication
        run: |
          yarn config set npmScopes.weka.npmRegistryServer "https://npm.pkg.github.com"
          yarn config set npmScopes.weka.npmAuthToken "${{ secrets.GITHUB_TOKEN }}"

      - name: Publish to GitHub Packages
        run: yarn npm publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-observe:
    needs: publish
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/update-observe-frontend.yml
    with:
      version: ${{ github.ref_name }}
      tickets: ${{ needs.publish.outputs.tickets }}
    secrets: inherit
