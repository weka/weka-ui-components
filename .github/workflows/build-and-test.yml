name: Build and Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck (changed files only)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(ts|tsx)$' | tr '\n' '\0' | xargs -0 printf '%s|' | sed 's/|$//')
          if [ -z "$CHANGED" ]; then
            echo "No TypeScript files changed."
            exit 0
          fi
          yarn typecheck 2>&1 | grep -E "$CHANGED" || true

      - name: Lint (changed files only)
        if: github.event_name == 'pull_request'
        env:
          ESLINT_PLUGIN_DIFF_COMMIT: origin/${{ github.base_ref }}
        run: yarn exec eslint . --config eslint.diff.config.mjs


      - name: Test
        run: yarn test:run

      - name: Build
        run: yarn build
